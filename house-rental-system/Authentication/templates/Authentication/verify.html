
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify Email — House Rental System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .otp-box {
      background: #fff;
      border: 1.5px solid #e8eaf0;
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(28, 43, 74, 0.1);
    }

    .otp-icon {
      width: 52px;
      height: 52px;
      background: rgba(245, 166, 35, 0.1);
      border: 1.5px solid rgba(245, 166, 35, 0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin: 0 auto 1.25rem;
    }

    .otp-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #f5a623;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .otp-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #1c2b4a;
      margin-bottom: 0.4rem;
    }

    .otp-subtitle {
      font-size: 0.82rem;
      color: #8892a8;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 0.85rem;
      text-align: left;
    }

    .field-group label {
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #8892a8;
      font-weight: 500;
    }

    .field-group input {
      width: 100%;
      padding: 10px 14px;
      background: #f8f9fc;
      border: 1.5px solid #e8eaf0;
      border-radius: 8px;
      color: #1c2b4a;
      font-size: 0.875rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .field-group input::placeholder { color: #b0b8cc; }
    .field-group input:focus { border-color: #f5a623; background: #fff; }

    .btn-verify {
      width: 100%;
      padding: 11px;
      background: #1c2b4a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.875rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 0.5rem;
    }

    .btn-verify:hover { background: #f5a623; color: #1c2b4a; }

    .message {
      margin-top: 1rem;
      font-size: 0.8rem;
      padding: 8px 12px;
      border-radius: 6px;
      text-align: left;
    }

    .message.success {
      color: #1a6b3a;
      background: rgba(26, 107, 58, 0.07);
      border: 1px solid rgba(26, 107, 58, 0.2);
    }

    .message.error {
      color: #c0392b;
      background: rgba(192, 57, 43, 0.07);
      border: 1px solid rgba(192, 57, 43, 0.2);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: #8892a8;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: #1c2b4a; }
  </style>
</head>
<body>

<div class="otp-box">
  <div class="otp-icon">✉️</div>
  <p class="otp-eyebrow">House Rental System</p>
  <h2>Email Verification</h2>
  <p class="otp-subtitle">Enter your email and the OTP we sent you to verify your account.</p>

  <form method="POST">
    {% csrf_token %}

    <div class="field-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" value="{{ request.POST.email }}" required>
    </div>

    <div class="field-group">
      <label>OTP Code</label>
      <input type="text" name="otp" placeholder="Enter 6-digit OTP" required>
    </div>

    <button type="submit" class="btn-verify">Verify Email</button>

    {% if messages %}
      {% for message in messages %}
        <p class="message {% if message.tags %}{{ message.tags }}{% endif %}">
          {{ message }}
        </p>
      {% endfor %}
    {% endif %}
  </form>

  <a href="/login/" class="back-link">← Back to Login</a>
</div>

</body>
</html>
